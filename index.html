<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小金井市議会 議事録アーカイブ（非公式）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue-700:#264af4; --blue-900:#0017c1; --blue-50:#e8f1fe;
  --g-50:#f2f2f2; --g-100:#e6e6e6; --g-200:#cccccc; --g-400:#999; --g-536:#767676; --g-700:#4d4d4d; --g-800:#333; --g-900:#1a1a1a; --white:#fff;
  --primary:var(--blue-900); --primary-soft:var(--blue-50);
  --navy:#15315a; --navy-soft:#e9eef5; --bg:var(--g-50); --surface:var(--white);
  --ink:var(--g-900); --text:var(--g-800); --muted:#666; --line:var(--g-100); --line2:#eceff3; --border:var(--g-200); --radius:8px;
}
*{box-sizing:border-box;} html,body{height:100%;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
.topbar{height:6px;background:var(--navy);}
.app{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 6px);}

.side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow:hidden;}
.brand{padding:22px 20px 16px;border-bottom:1px solid var(--line);}
.brand .kicker{font-size:.72rem;letter-spacing:.2em;color:var(--navy);font-weight:700;margin:0 0 6px;}
.brand h1{font-size:1.45rem;font-weight:900;color:var(--navy);margin:0;line-height:1.3;}
.brand .tag{margin:10px 0 0;color:var(--muted);font-size:.8rem;line-height:1.65;}
.brand .nbadge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:.7rem;font-weight:700;letter-spacing:.04em;color:#6e5600;background:#fff0b3;border:1px solid #ffd43d;padding:4px 10px;border-radius:999px;}
.side-search{position:relative;padding:12px 16px 8px;}
.side-search svg{position:absolute;left:29px;top:50%;transform:translateY(-50%);color:var(--g-536);}
.side-search input{width:100%;padding:10px 13px 10px 38px;font-size:.86rem;font-family:inherit;color:var(--ink);background:var(--white);border:1px solid var(--border);border-radius:var(--radius);outline:none;}
.side-search input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);}

.facets{display:flex;flex-wrap:wrap;gap:6px;padding:4px 16px 12px;border-bottom:1px solid var(--line);}
.facet{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--border);color:var(--text);
  font-family:inherit;font-size:.78rem;font-weight:500;padding:6px 10px;border-radius:999px;cursor:pointer;transition:.12s;}
.facet:hover{background:var(--g-50);}
.facet.is-active{background:var(--navy-soft);color:var(--navy);border-color:var(--navy);font-weight:700;}
.fdot{width:9px;height:9px;border-radius:50%;flex:none;}
.fcnt{color:var(--g-536);font-size:.72rem;font-variant-numeric:tabular-nums;}
.facet.is-active .fcnt{color:var(--navy);}

.list{flex:1;overflow-y:auto;padding:10px 12px 24px;}
.list::-webkit-scrollbar{width:8px;} .list::-webkit-scrollbar-thumb{background:var(--g-200);border-radius:4px;}
.session{margin-bottom:8px;}
.session-head{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius);
  user-select:none;transition:background .12s;}
.session-head::-webkit-details-marker{display:none;}
.session-head:hover{background:var(--g-50);}
.session-name{font-weight:700;color:var(--navy);font-size:.92rem;}
.session-count{font-size:.7rem;font-weight:700;color:var(--g-700);background:var(--g-100);padding:1px 9px;border-radius:999px;}
.session-count::after{content:"件";font-weight:500;}
.session .chev{margin-left:auto;color:var(--g-400);font-size:.85rem;transition:transform .2s;}
.session[open] .chev{transform:rotate(180deg);}
.entries{display:flex;flex-direction:column;padding:2px 0 6px;}
.entry{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:none;color:var(--text);
  font-family:inherit;text-align:left;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:.12s;
  box-shadow:inset 3px 0 0 transparent;}
.entry:hover{background:var(--primary-soft);}
.entry.is-active{background:var(--navy-soft);box-shadow:inset 3px 0 0 var(--navy);}
.entry .date{flex:none;width:38px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:.8rem;color:var(--ink);}
.entry .cdot{flex:none;width:10px;height:10px;border-radius:2px;}
.entry .name{flex:1;font-size:.86rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.entry.is-active .name{font-weight:700;color:var(--navy);}
.nores{display:none;text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem;}

.preview{height:100%;background:#fff;overflow:hidden;display:flex;flex-direction:column;}
.preview iframe{width:100%;flex:1;border:0;display:block;background:#fff;}
.backbar{display:none;}

/* ===== レスポンシブ：狭幅は「一覧⇔詳細」切替式 ===== */
@media(max-width:820px){
  .app{grid-template-columns:1fr;}
  .side{height:calc(100vh - 6px);}
  .preview{display:none;}
  body.show-detail .side{display:none;}
  body.show-detail .preview{display:flex;height:calc(100vh - 6px);}
  .backbar{display:flex;align-items:center;gap:8px;width:100%;border:none;cursor:pointer;
    font-family:inherit;font-size:.9rem;font-weight:700;color:#fff;background:var(--navy);padding:13px 16px;}
}
</style>
</head>

<script>
const frame=document.getElementById('frame');
const q=document.getElementById('q');
let curCat='all', curQ='';

function applyFilter(){
  let anyGlobal=false;
  document.querySelectorAll('.session').forEach(sess=>{
    let any=false;
    sess.querySelectorAll('.entry').forEach(e=>{
      const okCat = curCat==='all' || e.dataset.cat===curCat;
      const okQ = !curQ || e.dataset.text.toLowerCase().includes(curQ);
      const show = okCat && okQ;
      e.style.display = show ? '' : 'none';
      if(show){ any=true; anyGlobal=true; }
    });
    sess.style.display = any ? '' : 'none';
    if(any && curQ) sess.open = true;
  });
  document.getElementById('nores').style.display = anyGlobal ? 'none' : 'block';
}

document.querySelectorAll('.entry').forEach(e=>{
  e.addEventListener('click',()=>{
    document.querySelectorAll('.entry').forEach(x=>x.classList.remove('is-active'));
    e.classList.add('is-active');
    frame.src = e.dataset.href;
    document.body.classList.add('show-detail'); // 狭幅時は詳細表示へ切替
    frame.scrollIntoView({block:'start'});
  });
});
document.getElementById('back').addEventListener('click',()=>{
  document.body.classList.remove('show-detail');
});
document.querySelectorAll('.facet').forEach(f=>{
  f.addEventListener('click',()=>{
    document.querySelectorAll('.facet').forEach(x=>x.classList.remove('is-active'));
    f.classList.add('is-active');
    curCat=f.dataset.cat; applyFilter();
  });
});
q.addEventListener('input',e=>{ curQ=e.target.value.trim().toLowerCase(); applyFilter(); });

// 初期アクティブ＝先頭
const f0=document.querySelector('.entry');
if(f0) f0.classList.add('is-active');
</script>
